<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>اتصل بنا — نوفا تك</title>

    <!-- Same trackers — loaded before any consent. -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-NOVATECHXX"></script>

    <style>
      body { font-family: 'Tajawal', system-ui, sans-serif; max-width: 560px;
             margin: 48px auto; padding: 0 24px; background: #FAFAFA; }
      form { background: white; padding: 32px; border-radius: 12px;
             border: 1px solid #E5E7EB; }
      label { display: block; margin-top: 16px; font-weight: 600; }
      input, textarea { width: 100%; padding: 10px 12px; margin-top: 6px;
                        border: 1px solid #D1D5DB; border-radius: 8px;
                        font-family: inherit; font-size: 15px; }
      button { background: #4F46E5; color: white; padding: 10px 24px;
               border: 0; border-radius: 8px; font-weight: 600;
               margin-top: 20px; cursor: pointer; }
      a { color: #4F46E5; }
    </style>
  </head>
  <body>
    <!-- ============================================================= -->
    <!-- DELIBERATE GAP: form collects PII with:                        -->
    <!--   - no consent checkbox                                        -->
    <!--   - no link to the privacy policy                              -->
    <!--   - no purpose statement                                       -->
    <!-- (Form-scanner isn't implemented yet — Week 2+ — but this       -->
    <!--  page exists so we can point users at a realistic example.)    -->
    <!-- ============================================================= -->

    <h1>اتصل بنا</h1>
    <p>املأ النموذج وسيتواصل معكم فريق المبيعات.</p>

    <form method="POST" action="#">
      <label for="name">الاسم الكامل</label>
      <input id="name" name="name" type="text" required />

      <label for="email">البريد الإلكتروني</label>
      <input id="email" name="email" type="email" required />

      <label for="phone">رقم الجوال</label>
      <input id="phone" name="phone" type="tel" required />

      <label for="company">اسم الشركة</label>
      <input id="company" name="company" type="text" />

      <label for="message">رسالتك</label>
      <textarea id="message" name="message" rows="4"></textarea>

      <button type="submit">أرسل</button>
    </form>

    <p style="margin-top: 32px; text-align: center;">
      <a href="./index.html">← العودة للصفحة الرئيسية</a>
    </p>
  </body>
</html>
